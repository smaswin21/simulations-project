simulation:
  name: "Village Council Commons"
  version: "1.0"
  max_rounds: 10
  description_file: "scenario.md"

world:
  locations:
    - name: "Village Council"
      type: "public"
      starting_location: true
      actions_allowed: ["MOVE", "MESSAGE", "SANCTION", "REPORT_DATA", "WAIT"]
      aliases: ["council", "meeting"]

    - name: "Pasture"
      type: "resource"
      actions_allowed: ["MOVE", "GRAZE_SUSTAINABLE", "GRAZE_AGGRESSIVE", "WAIT"]
      aliases: ["field", "commons"]

agents:
  count: 10
  persona_distribution:
    big_five: "stratified"
    crt_distribution: [0.2, 0.3, 0.3, 0.2]
    risk_preference: "uniform"

resource:
  name: "grazing_units"
  unit: "units"
  location: "Pasture"
  initial_supply: 120
  resource_extraction_action: "GRAZE"
  visibility: "all"

commons:
  enabled: true
  regeneration_per_round: 12
  max_stock: 120
  collapse_threshold: 20
  suggested_quota_per_agent: 1

constraints:
  graze_amounts_allowed: [0, 1, 2]

metrics:
  track:
    - "resource_stock"
    - "total_grazed"
    - "cooperation_rate"
