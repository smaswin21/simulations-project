      // ── Utility ─────────────────────────────────────────────────────────────
      const jitter = (base, range, seed) => base + ((seed * 7919) % (range * 2)) - range;
      const actionColor = { SPEAK: "#60a5fa", MOVE: "#a78bfa", GRAZE: "#22c55e", SHARE: "#34d399", WAIT: "#94a3b8" };

      function TraitRadar({ traits, size = 120 }) {
        const labels = Object.keys(traits);
        const cx = size / 2, cy = size / 2, r = size * 0.36;
        const step = (2 * Math.PI) / labels.length;
        const pts = labels.map((_, i) => {
          const a = step * i - Math.PI / 2;
          return `${cx + r * Object.values(traits)[i] * Math.cos(a)},${cy + r * Object.values(traits)[i] * Math.sin(a)}`;
        }).join(" ");
        return (
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            {[0.25, 0.5, 0.75, 1].map(ring => (
              <polygon key={ring} points={labels.map((_, i) => {
                const a = step * i - Math.PI / 2;
                return `${cx + r * ring * Math.cos(a)},${cy + r * ring * Math.sin(a)}`;
              }).join(" ")} fill="none" stroke="#1e293b" strokeWidth="0.5" />
            ))}
            <polygon points={pts} fill="rgba(34,197,94,0.15)" stroke="#22c55e" strokeWidth="1.5" />
            {labels.map((l, i) => {
              const a = step * i - Math.PI / 2;
              return (
                <text
                  key={l}
                  x={cx + (r + 13) * Math.cos(a)}
                  y={cy + (r + 13) * Math.sin(a)}
                  textAnchor="middle"
                  dominantBaseline="central"
                  fill="#64748b"
                  fontSize="9"
                  fontWeight="600"
                  fontFamily="monospace"
                >
                  {l}
                </text>
              );
            })}
          </svg>
        );
      }

      function StockGauge({ stock, max, threshold }) {
        const pct = (stock / max) * 100;
        const dangerPct = (threshold / max) * 100;
        const clr = stock <= threshold ? "#ef4444" : stock <= threshold * 2 ? "#f59e0b" : "#22c55e";
        return (
          <div className="relative">
            <div className="flex items-center gap-2">
              <div className="flex-1 h-3 rounded-full bg-slate-800 overflow-hidden relative">
                <div className="absolute h-full w-px bg-red-500/60" style={{ left: `${dangerPct}%` }} />

              <span className="text-[8px] text-slate-600 font-mono">{max}</span>

                                <h2 className="text-xl font-bold text-white">{focused}</h2>
                                <div className="flex gap-2 mt-1 flex-wrap">
                                  <span className="text-[10px] px-2 py-0.5 rounded bg-emerald-950/60 text-emerald-500 font-mono border border-emerald-900/40">CRT: {focusAgent.crt}/3</span>
                                  <span className="text-[10px] px-2 py-0.5 rounded bg-emerald-950/60 text-emerald-500 font-mono border border-emerald-900/40">Risk: {focusAgent.risk}</span>
                                  <span className="text-[10px] px-2 py-0.5 rounded bg-emerald-950/60 text-emerald-500 font-mono border border-emerald-900/40">Dependents: {focusAgent.dependents}</span>
                                  <span className="text-[10px] px-2 py-0.5 rounded bg-emerald-950/60 text-amber-400 font-mono border border-amber-900/30">🌿 {data.actions.find(a => a.agent === focused)?.held || 0} held</span>
                                </div>
                              </div>
                            </div>
                            <button onClick={() => setFocused(null)} className="text-slate-600 hover:text-slate-400 text-xs px-2 py-1 rounded border border-slate-800 hover:border-slate-600 transition-colors">
                              ✕ Close
                            </button>
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div className="rounded-xl bg-emerald-950/20 border border-emerald-900/30 p-4">
                              <h3 className="text-[10px] font-bold text-emerald-500 uppercase tracking-wider mb-2">Big Five Profile</h3>
                              <div className="flex justify-center"><TraitRadar traits={focusAgent.traits} size={140} /></div>
                              <div className="grid grid-cols-5 gap-1 mt-2">
                                {Object.entries(focusAgent.traits).map(([k, v]) => (
                                  <div key={k} className="text-center">
                                    <div className="text-[9px] text-slate-600 font-mono">{k}</div>
                                    <div className="text-xs font-bold text-white">{(v * 100).toFixed(0)}</div>
                                  </div>
                                ))}
                              </div>
                            </div>

                            <div className="rounded-xl bg-emerald-950/20 border border-emerald-900/30 p-4">
                              <h3 className="text-[10px] font-bold text-blue-400 uppercase tracking-wider mb-3">Predicted Commons Behavior</h3>
                              <div className="space-y-2 text-xs">
                                {focusAgent.traits.A <= 0.3 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-red-400" />Overgrazes: prioritizes self over commons</div>}
                                {focusAgent.traits.A >= 0.7 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400" />Cooperates: respects quotas, proposes fair rules</div>}
                                {focusAgent.traits.E >= 0.7 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-blue-400" />Vocal: leads discussions, calls out violations</div>}
                                {focusAgent.traits.C >= 0.7 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-violet-400" />Systematic: tracks data, drafts formal rules</div>}
                                {focusAgent.crt >= 2 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-cyan-400" />Strategic: calculates sustainable limits</div>}
                                {focusAgent.crt <= 1 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-orange-400" />Reactive: follows herd, short-term decisions</div>}
                                {focusAgent.risk === "seeking" && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-amber-400" />Aggressive early grazing, stockpiles</div>}
                                {focusAgent.risk === "averse" && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-teal-400" />Conservative: waits for collective agreement</div>}
                                {focusAgent.dependents >= 3 && <div className="flex items-center gap-2 text-slate-300"><span className="w-1.5 h-1.5 rounded-full bg-pink-400" />High family pressure: justifies extra extraction</div>}
                              </div>
                            </div>
                          </div>

                          <div className="rounded-xl bg-emerald-950/20 border border-emerald-900/30 p-4">
                            <h3 className="text-[10px] font-bold text-amber-400 uppercase tracking-wider mb-3">Season-by-Season Actions</h3>
                            <div className="space-y-2">
                              {focusHistory.map(({ round: r, action }) => action && (
                                <div key={r} className="flex items-start gap-3">
                                  <div className="text-[10px] font-mono text-slate-600 w-5 shrink-0 pt-0.5">S{r}</div>
                                  <div className="w-1.5 h-1.5 rounded-full shrink-0 mt-1.5" style={{ background: actionColor[action.action] }} />
                                  <div className="flex-1 text-xs text-slate-300 leading-relaxed">
                                    <span className="font-semibold font-mono mr-1" style={{ color: actionColor[action.action] }}>{action.action}</span>
                                    at {action.location} — {action.detail}
                                    {action.held > 0 && <span className="text-emerald-600 font-mono ml-1">(🌿{action.held})</span>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* FABRIC VIEW */}
                  {mode === "fabric" && (
                    <div className="absolute inset-0">
                      <svg className="w-full h-full">
                        {edges.map((e, i) => {
                          const pa = fabPos[e.a], pb = fabPos[e.b];
                          return (
                            <line
                              key={i}
                              x1={`${pa.x}%`}
                              y1={`${pa.y}%`}
                              x2={`${pb.x}%`}
                              y2={`${pb.y}%`}
                              stroke="#22c55e"
                              strokeWidth={Math.min(e.w * 0.4, 3)}
                              opacity={0.15 + Math.min(e.w * 0.04, 0.35)}
                            />
                          );
                        })}
                        {AGENTS.map(a => {
                          const pos = fabPos[a.name];
                          const ag = data.actions.find(act => act.agent === a.name);
                          const held = ag?.held || 0;
                          const sz = 10 + held * 0.4;
                          return (
                            <g key={a.name} style={{ cursor: "pointer" }} onClick={() => { setFocused(a.name); setMode("mind"); }}>
                              <circle cx={`${pos.x}%`} cy={`${pos.y}%`} r={sz} fill={`${a.color}15`} stroke={a.color} strokeWidth="1.5" />
                              <text x={`${pos.x}%`} y={`${pos.y - 0.5}%`} textAnchor="middle" dominantBaseline="central" fill="white" fontSize="8" fontWeight="600" fontFamily="Sora, sans-serif">
                                {a.name.slice(0, 4)}
                              </text>
                              <text x={`${pos.x}%`} y={`${pos.y + 3}%`} textAnchor="middle" fill="#4ade80" fontSize="8" fontFamily="IBM Plex Mono, monospace">
                                🌿{held}
                              </text>
                            </g>
                          );
                        })}
                      </svg>
                      <div className="absolute bottom-4 left-4 px-3 py-2 rounded-lg bg-black/60 border border-emerald-900/30 text-[9px] text-emerald-700 font-mono">
                        Edge = co-location frequency · Node size = grazing held · Click → Mind view
                      </div>
                    </div>
                  )}
                </div>

                {/* Controls */}
                <div className="mt-3 flex items-center gap-3">
                  <button onClick={() => setRound(Math.max(0, round - 1))} className="w-8 h-8 rounded-lg bg-emerald-950/50 border border-emerald-900/30 flex items-center justify-center text-emerald-600 hover:text-emerald-300 transition-colors text-xs">◂</button>
                  <button
                    onClick={() => setPlaying(!playing)}
                    className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold transition-all border ${playing ? "bg-red-950/40 border-red-900/40 text-red-400" : "bg-emerald-950/50 border-emerald-900/40 text-emerald-300"}`}
                  >
                    {playing ? "⏸" : "▶"}
                  </button>
                  <button onClick={() => setRound(Math.min(SAMPLE_ROUNDS.length - 1, round + 1))} className="w-8 h-8 rounded-lg bg-emerald-950/50 border border-emerald-900/30 flex items-center justify-center text-emerald-600 hover:text-emerald-300 transition-colors text-xs">▸</button>

                  <div className="flex-1 flex items-center gap-0.5">
                    {SAMPLE_ROUNDS.map((_, i) => (
                      <button
                        key={i}
                        onClick={() => setRound(i)}
                        className={`flex-1 h-2 rounded-full transition-all ${i === round ? "bg-emerald-400 scale-y-150" : i < round ? "bg-emerald-900/60" : "bg-slate-800/50"}`}
                      />
                    ))}
                  </div>

                  {[{ l: "1×", ms: 3500 }, { l: "2×", ms: 2000 }, { l: "4×", ms: 900 }].map(s => (
                    <button
                      key={s.l}
                      onClick={() => setSpeed(s.ms)}
                      className={`px-2 py-1 rounded text-[10px] font-mono font-bold ${speed === s.ms ? "bg-emerald-900/60 text-emerald-300" : "text-emerald-800 hover:text-emerald-500"}`}
                    >
                      {s.l}
                    </button>
                  ))}
                </div>
              </div>

              {/* Right Panel */}
              <div className="w-72 shrink-0 flex flex-col rounded-2xl border border-emerald-900/30 bg-black/30 backdrop-blur overflow-hidden">
                <div className="px-4 py-3 border-b border-emerald-900/30">
                  <div className="text-[10px] font-bold text-emerald-700 uppercase tracking-widest font-mono">Activity · Season {data.round}</div>
                </div>
                <div className="flex-1 overflow-y-auto p-2.5 space-y-1.5">
                  {data.actions.map((a, i) => {
                    const ag = AGENTS.find(x => x.name === a.agent);
                    const hl = focused === a.agent;
                    return (
                      <div
                        key={i}
                        onClick={() => setFocused(a.agent === focused ? null : a.agent)}
                        className={`rounded-lg p-2 border cursor-pointer transition-all ${hl ? "border-emerald-800/60 bg-emerald-950/40" : "border-transparent bg-emerald-950/10 hover:bg-emerald-950/30"}`}
                      >
                        <div className="flex items-center gap-1.5 mb-0.5">
                          <div className="w-3.5 h-3.5 rounded-full border flex items-center justify-center text-[6px] font-bold" style={{ borderColor: ag?.color, color: ag?.color }}>
                            {a.agent[0]}
                          </div>
                          <span className="text-[10px] font-semibold" style={{ color: ag?.color }}>{a.agent}</span>
                          <span className="text-[8px] font-mono px-1 py-0.5 rounded ml-auto" style={{ background: `${actionColor[a.action]}10`, color: actionColor[a.action] }}>{a.action}</span>
                        </div>
                        <div className="text-[9px] text-slate-500 leading-relaxed pl-5">
                          {a.detail.length > 70 ? a.detail.slice(0, 70) + "..." : a.detail}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="border-t border-emerald-900/30 p-3">
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-[9px] font-bold text-emerald-700 uppercase tracking-widest font-mono">Holdings</div>
                    <div className="text-[9px] font-mono text-emerald-800">Total: {totalH}🌿</div>
                  </div>
                  <div className="space-y-1 max-h-48 overflow-y-auto">
                    {[...data.actions].sort((a, b) => b.held - a.held).map(a => {
                      const ag = AGENTS.find(x => x.name === a.agent);
                      const pct = (a.held / 30) * 100;
                      return (
                        <div key={a.agent} className="flex items-center gap-1.5 cursor-pointer" onClick={() => { setFocused(a.agent); setMode("mind"); }}>
                          <span className="text-[9px] font-semibold w-14 truncate" style={{ color: ag?.color }}>{a.agent}</span>
                          <div className="flex-1 h-1.5 rounded-full bg-slate-900 overflow-hidden">
                            <div className="h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(pct, 100)}%`, background: ag?.color, opacity: 0.5 }} />
                          </div>
                          <span className="text-[9px] font-mono text-slate-600 w-4 text-right">{a.held}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Mount
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<SimulationTheater />);
    </script>
  </body>
</html>
